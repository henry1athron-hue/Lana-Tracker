<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wellness Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>
    <header>
        <h1 id="header-title">Food Log</h1>
    </header>

    <main id="main-content">
        <!-- Food Section -->
        <section id="view-food" class="view active">
            <form id="form-food" class="input-form">
                <input type="text" id="food-name" placeholder="What did you eat?" required>
                <input type="text" id="food-details" placeholder="Calories / Portion (Optional)">
                <button type="submit">Log Food</button>
            </form>
        </section>

        <!-- Medication Section -->
        <section id="view-meds" class="view">
            <form id="form-meds" class="input-form">
                <input type="text" id="med-name" placeholder="Medication Name" required>
                <input type="text" id="med-dosage" placeholder="Dosage (e.g., 200mg)" required>
                <button type="submit">Log Medication</button>
            </form>
        </section>

        <!-- Notes Section -->
        <section id="view-notes" class="view">
            <form id="form-notes" class="input-form">
                <textarea id="note-text" placeholder="How are you feeling today?" rows="4" required></textarea>
                <button type="submit">Save Note</button>
            </form>
        </section>

        <!-- History/Log Section -->
        <section id="view-history" class="view">
            <div class="history-controls">
                <select id="history-filter">
                    <option value="all">All Entries</option>
                    <option value="food">Food</option>
                    <option value="meds">Medication</option>
                    <option value="notes">Notes</option>
                </select>
            </div>
            <div id="log-container"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="view-food" data-title="Food Log">🍏<br>Food</button>
        <button class="nav-btn" data-target="view-meds" data-title="Medication">💊<br>Meds</button>
        <button class="nav-btn" data-target="view-notes" data-title="Notes">📝<br>Notes</button>
        <button class="nav-btn" data-target="view-history" data-title="History">🕒<br>History</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
