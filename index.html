<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daily Health Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>
    <div class="app-layout">
        <aside class="log-sidebar">
            <div class="sidebar-header">
                <h2>Daily History Logs</h2>
            </div>
            <div id="log-container" class="log-scroll-area">
                </div>
        </aside>

        <main class="action-area">
            <button id="btn-log-day" class="action-btn">Log Day</button>

            <div id="logging-menu" class="hidden">
                <div class="menu-tabs">
                    <button class="tab-btn active" data-tab="tab-food">Food</button>
                    <button class="tab-btn" data-tab="tab-meds">Meds</button>
                    <button class="tab-btn" data-tab="tab-notes">Notes</button>
                </div>

                <div class="tab-content active" id="tab-food">
                    <form id="form-food">
                        <input type="hidden" id="edit-id-food">
                        <input type="hidden" id="food-date-key">
                        <input type="text" id="food-name" placeholder="What did you eat?" required>
                        <input type="text" id="food-cals" placeholder="Calories (Optional)">
                        <button type="submit" class="save-btn">Save Entry</button>
                    </form>
                </div>

                <div class="tab-content" id="tab-meds">
                    <form id="form-meds">
                        <input type="hidden" id="edit-id-meds">
                        <input type="hidden" id="meds-date-key">
                        <input type="text" id="med-name" placeholder="Medication Name" required>
                        <input type="text" id="med-dosage" placeholder="Dosage (e.g., 50mg)" required>
                        <button type="submit" class="save-btn">Save Entry</button>
                    </form>
                </div>

                <div class="tab-content" id="tab-notes">
                    <form id="form-notes">
                        <input type="hidden" id="edit-id-notes">
                        <input type="hidden" id="notes-date-key">
                        <textarea id="note-text" placeholder="How are you feeling right now?" rows="5" required></textarea>
                        <button type="submit" class="save-btn">Save Entry</button>
                    </form>
                </div>
                
                <button id="btn-close-menu" class="close-btn">Cancel</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
